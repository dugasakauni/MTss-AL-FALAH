<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pendaftaran - MTs Al-Falah</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="/">MTs Al-Falah</a>
        </div>
    </nav>

    <div class="container my-5">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="card shadow">
                    <div class="card-header bg-success text-white">
                        <h4 class="mb-0">Formulir Pendaftaran Siswa Baru</h4>
                    </div>
                    <div class="card-body">
                        <form action="/daftar" method="POST">
                            <div class="mb-3">
                                <label class="form-label">Nama Lengkap</label>
                                <input type="text" name="nama" class="form-control" placeholder="Masukkan nama lengkap" required>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">NISN</label>
                                <input type="number" name="nisn" class="form-control" placeholder="Masukkan 10 digit NISN" required>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Asal Sekolah (SD/MI)</label>
                                <input type="text" name="asal" class="form-control" placeholder="Contoh: SDN 01 Jakarta" required>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Nomor WhatsApp Orang Tua</label>
                                <input type="tel" name="whatsapp" class="form-control" placeholder="08xxxxxxxxxx" required>
                            </div>
                            <button type="submit" class="btn btn-success w-100">Kirim Pendaftaran</button>
                        </form>
                    </div>
                </div>
                <div class="text-center mt-3">
                    <a href="/" class="text-decoration-none">← Kembali ke Beranda</a>
                </div>
            </div>
        </div>
    </div>

</body>
</html>
